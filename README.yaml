description: |-
  Terraform module to create and manage Domain service resource on Digital Ocean.

usage : |-
  ### Simple Example
  Here are some examples of how you can use this module in your inventory structure:
  ## basic example
  ```hcl
  module "domain" {
    source          = "terraform-do-modules/domain/digitalocean"
    version         = "1.0.5"
    name            = "test.example.com"
  }
    ```
  ## complete example
  ```hcl
  module "domain" {
    source          = "terraform-do-modules/domain/digitalocean"
    version         = "1.0.5"
    name            = "demo.hello.com"

    records = {
      record1 = {
        type  = "A"
        name  = "test"
        value = "192.168.0.12"
      },
      record2 = {
        type  = "A"
        name  = "demo2"
        value = "192.168.0.13"
      },
    }
  }
    ```

  ### Deploy with Terraform
  ```bash
  terraform init
  terraform plan
  terraform apply
  ```

  ### Deploy with OpenTofu
  ```bash
  tofu init
  tofu plan
  tofu apply
  ```
